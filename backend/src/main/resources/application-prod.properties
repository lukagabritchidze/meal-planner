# ===================================================================
# PRODUCTION PROFILE: PostgreSQL (Aiven Managed on Render Host)
# ===================================================================

# DataSource Configurations (using Environment Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection Pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# CORS: allowed frontend origins (comma-separated). Overridable via APP_CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://meal-planner-phi-six.vercel.app}
