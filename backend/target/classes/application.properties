# Active Profile Setup
spring.profiles.active=dev

# Bind to the port provided by the host (Render sets PORT); default to 8080 locally.
server.port=${PORT:8080}

# Application Identity
spring.application.name=mealplanner-backend

# Keep open-in-view explicit to silence the startup warning while
# preserving lazy-loading of associations during request handling.
spring.jpa.open-in-view=true
